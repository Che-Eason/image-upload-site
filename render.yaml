services:
  - type: web
    name: image-upload-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: MAX_FILE_SIZE
        value: "20971520"
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: uploads
      mountPath: /data/uploads
      sizeGB: 1
